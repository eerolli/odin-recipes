<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Smoothie</title>
</head>
<body>
    <h1>Protein Smoothie</h1>
    <img src="../images/smoothie.jpg" alt="Smoothie" width="500px" height="350px">
    <h2>Description:</h2>
    <p>A healthy and filling smoothie. Works as a breakfast, supper or after workout</p>
    <h2>Ingredients:</h2>
    <ul>
        <li>250g quark</li>
        <li>100g berries</li>
        <li>50g oats</li>
        <li>10g ground linseeds</li>
        <li>Water</li>
        <li>Honey</li>
    </ul>
    <h2>Steps:</h2>
    <ol>
        <li>Mix all together in a blender</li>
        <li>Drink</li>
    </ol>
</body>
</html>
